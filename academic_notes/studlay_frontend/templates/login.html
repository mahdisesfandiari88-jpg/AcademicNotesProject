<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Studlay</title>
    <!-- حتماً آدرس زیر را به فایل استایل اصلی‌ات متصل کن -->
    <link rel="stylesheet" href="../static/css/style.css">
     <link rel="stylesheet" href="../static/css/login.css">

</head>
<body>

<section class="login-page">
  <div class="login-wrapper">
    
    <!-- بخش چپ: فرم -->
    <div class="login-form-section">
      <div class="login-brand">
        <img src="/static/images/logo/studlay_logo.png" alt="Logo" class="logo-img">
        <h1>STUDLAY</h1>
      </div>

      <h2 class="login-title">Welcome Back!</h2>
      <p class="login-subtitle">Login to continue managing your notes and study progress.</p>

      <form class="login-form">
        <div class="login-input-group">
          <label>Username</label>
          <input type="username" placeholder="Enter your username" required>
        </div>

        <div class="login-input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required>
        </div>

        

        <button type="submit" class="login-btn">Login</button>

        <p class="login-signup-text">
          Don't have an account? <a href="signup.html">Sign up</a>
        </p>
      </form>
    </div>

    <!-- بخش راست: تصویر گرافیکی -->
    <div class="login-visual-section">
      <div class="login-visual-shape"></div>
      <!-- تصویر کنار لاگین را اینجا آدرس‌دهی کن -->
      <img src="/static/images/other_pics/loginpic.svg" alt="Login illustration" class="login-visual-img">
    </div>

  </div>
</section>

</body>
</html>
