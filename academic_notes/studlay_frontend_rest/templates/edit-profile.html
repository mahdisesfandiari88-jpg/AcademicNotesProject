<head>

<!-- Divider -->

<!-- ================= Course List ================= -->

                <span>English</span>

            <img src="../static/images/icons/ellipsis-vertical.svg" class="icon">

    </div>

</div>

</aside>
        

        <!-- Main Content -->
        <main class="main-content">

            <!-- ================= HEADER ================= -->

<header class="header">

    <!-- Page Title -->

    <div class="page-title">

          <h1>My Profile</h1>

    </div>

    

    <!-- Profile -->

    <div class="profile-box">

        <img src="../static/images/icons/avatar-default-symbolic-svgrepo-com.svg"
           class="profile-img"
           alt="Profile">

       <div class="profile-info">

           <h4>Souzan</h4>

           <span>Student</span>

        </div>

        <img src="../static/images/icons/chevron-down.svg" class="icon profile-arrow">

        <div class="profile-dropdown">

            <a href="profile.html">View Profile</a>

            <a href="#">Logout</a>

        </div>

    </div>

    

</header>

<!-- ================= Page Content ================= -->

<!-- ================= Page Content ================= -->
<!-- ================= Edit Profile ================= -->

<section class="profile-page">

    <div class="profile-card">

        <!-- Avatar -->

        <div class="profile-avatar">

            <img src="../static/images/other-pics/pfp.jpg" alt="Profile">

        </div>

        <!-- Upload -->

        <button class="upload-avatar-btn">
            Upload & Change Photo
        </button>


        <!-- Gender -->

        <div class="input-group">

            <label>Gender</label>

            <div class="gender-options">

                <label>
                    <input type="radio" name="gender" checked>
                    Female
                </label>

                <label>
                    <input type="radio" name="gender">
                    Male
                </label>

            </div>

        </div>


        <!-- Full Name -->

        <div class="input-group">

            <label>Full Name</label>

            <input
                type="text"
                value="Souzan Dadashzadeh"
            >

        </div>


        <!-- Email -->

        <div class="input-group">

            <label>Email</label>

            <input
                type="email"
                value="souzan@example.com"
            >

        </div>


        <!-- University -->

        <div class="input-group">

            <label>University</label>

            <input
                type="text"
                value="University of Guilan"
            >

        </div>

        <div class="input-group">

             <label>Major</label>

            <input
                  type="text"
                   value="Computer Science"
    >

         </div>


        <!-- Bio -->

        <div class="input-group">

            <label>Bio</label>

            <textarea rows="4">Passionate about programming, web development and creating beautiful user interfaces.</textarea>

        </div>


        <!-- Save -->

        <button class="edit-profile-btn">

            Save Changes

        </button>

    </div>

</section>
        </main>

        

    </div>

<script>

const myCoursesBtn = document.querySelector(".my-courses-btn");
const coursesDropdown = document.querySelector(".courses-dropdown");
const arrow = document.querySelector(".arrow-icon");

coursesDropdown.style.display = "none";

myCoursesBtn.addEventListener("click", function (e) {

    e.preventDefault();

    if (coursesDropdown.style.display === "none") {

        coursesDropdown.style.display = "block";

        arrow.style.transform = "rotate(0deg)";

    } else {

        coursesDropdown.style.display = "none";

        arrow.style.transform = "rotate(-90deg)";

    }

});

// ================= Profile =================

const profileBox = document.querySelector(".profile-box");
const profileDropdown = document.querySelector(".profile-dropdown");
const profileArrow = document.querySelector(".profile-arrow");

profileDropdown.style.display = "none";

profileBox.addEventListener("click", function () {

    if (profileDropdown.style.display === "none") {

        profileDropdown.style.display = "block";
        profileArrow.style.transform = "rotate(180deg)";

    } else {

        profileDropdown.style.display = "none";
        profileArrow.style.transform = "rotate(0deg)";

    }

});



</script>



    


</body>
