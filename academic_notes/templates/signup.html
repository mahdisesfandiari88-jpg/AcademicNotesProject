<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
    
</head>
<body>

<div class="signup-wrapper">
    <!-- بخش بصری سمت چپ (کارت سبز با شکل قوسی) -->
    <div class="signup-visual-card">
        <div class="signup-visual-shape"></div>
        <img src="{% static 'images/other_pics/signuppic.svg' %}" alt="Sign up illustration" class="signup-visual-img">
    </div>

    <!-- بخش فرم سمت راست (کارت سفید) -->
    <div class="signup-form-card">
        <h1>Sign Up</h1>
        <p class="subtitle">Just a few quick things to get started</p>

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label> User Name</label>
                <input type="text" name="username" placeholder="Enter User Name" required>
            </div>
            
            <div class="input-group">
                <label>Email ID</label>
                <input type="email" name="email" placeholder="Enter Email ID" required>
            </div>
            
            <div class="input-group">
                <label>New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password1" placeholder="Enter New Password" required>
                    <span class="password-toggle">
                        <!-- آیکون چشم ساده -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8A8580" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                </div>
            </div>
            
            <div class="input-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password2" placeholder="Enter Confirm Password" required>
                    <span class="password-toggle">
                        <!-- آیکون چشم ساده -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8A8580" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                </div>
            </div>
            
            <button type="submit" class="signup-button">Sign Up</button>
        </form>

        <p class="switch-auth">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
    </div>
</div>

</body>
</html>
