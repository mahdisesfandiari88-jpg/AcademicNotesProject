{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/course.css' %}">

<section class="add-course-page">

    <div class="add-course-card">

        <h1>Create New Course</h1>

        <p>Add a new course to organize your notes and files.</p>

        <div class="input-group">
            <label>Course Name</label>
            <input type="text" placeholder="e.g. Programming">
        </div>

        <div class="input-group">
            <label>Description</label>
            <textarea rows="4" placeholder="Write a short description..."></textarea>
        </div>

        <div class="input-group">

            <label>Choose Color</label>

            <div class="color-options">
                <div class="color-circle green active-color"></div>
                <div class="color-circle pink"></div>
                <div class="color-circle orange"></div>
                <div class="color-circle purple"></div>
            </div>

        </div>

        <button class="create-btn">
            Create Course
        </button>

    </div>

</section>

{% endblock %}

{% block extra_js %}

<script>

const colors = document.querySelectorAll(".color-circle");

colors.forEach(function(color){

    color.addEventListener("click", function(){

        colors.forEach(function(item){
            item.classList.remove("active-color");
        });

        this.classList.add("active-color");

    });

});

</script>

{% endblock %}
